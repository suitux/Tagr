name: Publish Docker Image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Optional image tag override
        required: false
        type: string
      push_latest:
        description: Also publish latest tag
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        shell: bash
        run: |
          if [[ -n "${{ inputs.tag }}" ]]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="1.0.0-kristen-${GITHUB_SHA::7}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Using tag: $TAG"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          build-args: |
            APP_VERSION=${{ steps.vars.outputs.tag }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/tagr:${{ steps.vars.outputs.tag }}

      - name: Tag and push latest
        if: ${{ inputs.push_latest }}
        shell: bash
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/${{ github.repository_owner }}/tagr:latest \
            ghcr.io/${{ github.repository_owner }}/tagr:${{ steps.vars.outputs.tag }}

      - name: Summary
        run: |
          echo "Published image:" >> "$GITHUB_STEP_SUMMARY"
          echo "- ghcr.io/${{ github.repository_owner }}/tagr:${{ steps.vars.outputs.tag }}" >> "$GITHUB_STEP_SUMMARY"
          if [[ "${{ inputs.push_latest }}" == "true" ]]; then
            echo "- ghcr.io/${{ github.repository_owner }}/tagr:latest" >> "$GITHUB_STEP_SUMMARY"
          fi
