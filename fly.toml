# fly.toml app configuration file generated for tagr-demo on 2026-03-01T16:37:50+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'tagr-demo'
primary_region = 'cdg'

[build]

[env]
  AUTH_USER = 'demo'
  DATABASE_URL = 'file:///data/tagr.db'
  MUSIC_FOLDERS = '/data/music'
  NODE_ENV = 'production'

[[mounts]]
  source = 'tagr_data'
  destination = '/data'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
